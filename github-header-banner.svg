<svg width="1200" height="300" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300">
  <defs>
    <!-- Premium gradient background -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#161b22;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1117;stop-opacity:1" />
    </linearGradient>
    
    <!-- Cyan accent gradient -->
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:0.3" />
      <stop offset="50%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0.3" />
    </linearGradient>
    
    <!-- Glow effect -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Text shadow -->
    <filter id="textShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.5"/>
    </filter>
    
    <!-- Noise pattern -->
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" result="noise" />
      <feColorMatrix in="noise" type="saturate" values="0"/>
      <feBlend in="SourceGraphic" in2="noise" mode="overlay" />
    </filter>
  </defs>
  
  <!-- Main background -->
  <rect width="1200" height="300" fill="url(#bgGradient)"/>
  
  <!-- Noise overlay for texture -->
  <rect width="1200" height="300" fill="url(#bgGradient)" opacity="0.05" filter="url(#noise)"/>
  
  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#accentGradient)" filter="url(#glow)"/>
  
  <!-- Left accent bar -->
  <rect x="0" y="0" width="3" height="300" fill="url(#accentGradient)" filter="url(#glow)"/>
  
  <!-- Decorative circles (subtle) -->
  <circle cx="1100" cy="50" r="35" fill="#06b6d4" opacity="0.08"/>
  <circle cx="100" cy="280" r="45" fill="#06b6d4" opacity="0.06"/>
  
  <!-- Vertical divider line -->
  <line x1="600" y1="40" x2="600" y2="260" stroke="#06b6d4" stroke-width="2" opacity="0.2"/>
  
  <!-- Main heading -->
  <text x="60" y="90" font-family="'Courier New', 'Monaco', monospace" font-size="48" font-weight="bold" fill="#f1f5f9" filter="url(#textShadow)">
    Supriya Rayala
  </text>
  
  <!-- Title -->
  <text x="60" y="150" font-family="'Courier New', 'Monaco', monospace" font-size="28" font-weight="600" fill="#06b6d4" filter="url(#glow)">
    Network Security Engineer
  </text>
  
  <!-- Subtitle/descriptor -->
  <text x="60" y="190" font-family="'Segoe UI', 'Helvetica Neue', sans-serif" font-size="16" fill="#cbd5e1">
    Firewall Architecture • Threat Detection • Cloud Security • Automation
  </text>
  
  <!-- Location badge -->
  <g>
    <rect x="60" y="210" width="180" height="26" fill="#06b6d4" opacity="0.15" rx="13"/>
    <text x="75" y="230" font-family="'Segoe UI', 'Helvetica Neue', sans-serif" font-size="13" fill="#06b6d4" font-weight="600">
      📍 Ohio, USA
    </text>
  </g>
  
  <!-- Right side: Tech stack icons -->
  <g>
    <!-- Cisco -->
    <rect x="820" y="50" width="75" height="40" fill="#1a1a1a" rx="6" stroke="#06b6d4" stroke-width="1.5" opacity="0.8"/>
    <text x="830" y="73" font-family="'Segoe UI', sans-serif" font-size="13" fill="#06b6d4" font-weight="600">
      Cisco
    </text>
    
    <!-- Splunk -->
    <rect x="920" y="50" width="75" height="40" fill="#1a1a1a" rx="6" stroke="#06b6d4" stroke-width="1.5" opacity="0.8"/>
    <text x="925" y="73" font-family="'Segoe UI', sans-serif" font-size="13" fill="#06b6d4" font-weight="600">
      Splunk
    </text>
    
    <!-- Palo Alto -->
    <rect x="1020" y="50" width="75" height="40" fill="#1a1a1a" rx="6" stroke="#06b6d4" stroke-width="1.5" opacity="0.8"/>
    <text x="1023" y="73" font-family="'Segoe UI', sans-serif" font-size="13" fill="#06b6d4" font-weight="600">
      Palo Alto
    </text>
    
    <!-- Python -->
    <rect x="820" y="110" width="75" height="40" fill="#1a1a1a" rx="6" stroke="#f97316" stroke-width="1.5" opacity="0.8"/>
    <text x="828" y="133" font-family="'Segoe UI', sans-serif" font-size="13" fill="#f97316" font-weight="600">
      Python
    </text>
    
    <!-- AWS -->
    <rect x="920" y="110" width="75" height="40" fill="#1a1a1a" rx="6" stroke="#f97316" stroke-width="1.5" opacity="0.8"/>
    <text x="935" y="133" font-family="'Segoe UI', sans-serif" font-size="13" fill="#f97316" font-weight="600">
      AWS
    </text>
    
    <!-- Azure -->
    <rect x="1020" y="110" width="75" height="40" fill="#1a1a1a" rx="6" stroke="#f97316" stroke-width="1.5" opacity="0.8"/>
    <text x="1032" y="133" font-family="'Segoe UI', sans-serif" font-size="13" fill="#f97316" font-weight="600">
      Azure
    </text>
  </g>
  
  <!-- Status indicator -->
  <g>
    <circle cx="850" cy="220" r="6" fill="#10b981"/>
    <text x="865" y="226" font-family="'Segoe UI', 'Helvetica Neue', sans-serif" font-size="14" fill="#cbd5e1">
      Open to Work • Cisco
    </text>
  </g>
  
  <!-- Bottom accent bar -->
  <rect x="0" y="297" width="1200" height="3" fill="url(#accentGradient)" filter="url(#glow)"/>
  
  <!-- Subtle corner accent -->
  <polygon points="1200,0 1200,40 1160,0" fill="#06b6d4" opacity="0.15"/>
</svg>